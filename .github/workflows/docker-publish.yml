name: Publish Docker

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      security-events: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract CDK version from Dockerfile
        id: cdk_version
        run: |
          echo "version=$(grep -oP 'aws-cdk@\K[0-9.]+' Dockerfile)" >> $GITHUB_OUTPUT

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      # PRs: load locally (no attestations — required for Scout local analysis)
      - name: Build and load (PR)
        if: github.event_name == 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          pull: true
          build-args: |
            APK_REFRESH=${{ github.run_id }}
          tags: pkumaschow/cdk:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # main: push with full supply chain attestations
      - name: Build and push (main)
        if: github.event_name == 'push'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          pull: true
          build-args: |
            APK_REFRESH=${{ github.run_id }}
          tags: |
            pkumaschow/cdk:latest
            pkumaschow/cdk:${{ steps.cdk_version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: mode=max
          sbom: true

      # PRs: compare against production, comment findings on the PR
      - name: Docker Scout compare
        if: github.event_name == 'pull_request'
        continue-on-error: true
        uses: docker/scout-action@v1
        with:
          command: compare
          image: pkumaschow/cdk:latest
          to-env: production
          ignore-unchanged: true
          only-severities: critical,high
          github-token: ${{ secrets.GITHUB_TOKEN }}

      # main: record CVEs against the production environment after push
      - name: Docker Scout record
        if: github.event_name == 'push'
        continue-on-error: true
        uses: docker/scout-action@v1
        with:
          command: cves
          image: pkumaschow/cdk:latest
          only-severities: critical,high
          github-token: ${{ secrets.GITHUB_TOKEN }}
