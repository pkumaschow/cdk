stages:
  - build
  - test
  - scan

variables:
  REGISTRY_IMAGE: "$CI_REGISTRY_IMAGE"

build-image:
  stage: build
  image:
    name: gcr.io/kaniko-project/executor:debug
    entrypoint: [""]
  variables:
    # Kaniko's full-filesystem snapshot of this large image needs real memory. Request enough to
    # schedule onto a roomy node (not an 8Gi worker) and cap with headroom — previously the pod
    # had no request and got node-OOM-killed (exit 137) during snapshotting. Honoured because the
    # k8s runner now sets memory_*_overwrite_max_allowed.
    KUBERNETES_MEMORY_REQUEST: "4Gi"
    KUBERNETES_MEMORY_LIMIT: "8Gi"
  before_script:
    - mkdir -p /kaniko/.docker
    - >
      echo "{\"auths\":{\"${CI_REGISTRY}\":{\"username\":\"${CI_REGISTRY_USER}\",\"password\":\"${CI_REGISTRY_PASSWORD}\"}}}"
      > /kaniko/.docker/config.json
  script:
    - export CDK_VERSION=$(grep -oE 'aws-cdk@[0-9.]+' "${CI_PROJECT_DIR}/Dockerfile" | head -1 | cut -d@ -f2)
    - echo "Building cdk image at CDK version ${CDK_VERSION}"
    - >
      /kaniko/executor
      --context "${CI_PROJECT_DIR}"
      --dockerfile "${CI_PROJECT_DIR}/Dockerfile"
      --destination "${REGISTRY_IMAGE}:${CI_COMMIT_SHORT_SHA}"
      --destination "${REGISTRY_IMAGE}:${CDK_VERSION}"
      --destination "${REGISTRY_IMAGE}:latest"
      --build-arg "APK_REFRESH=${CI_PIPELINE_ID}"
      --build-arg "CDK_VERSION=${CDK_VERSION}"
      --tar-path "${CI_PROJECT_DIR}/image.tar"
      --insecure
      --skip-tls-verify
      --compressed-caching=false
      --single-snapshot
  artifacts:
    paths:
      - image.tar
    expire_in: 1 hour
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'

smoke-test:
  stage: test
  # Run the ACTUAL image that build-image just pushed, instead of hand-extracting its layers and
  # chrooting in. The old approach was a fragile false-negative (gzip-compressed layers, symlink
  # resolution, exec-format quirks); running the real image exercises the true runtime. GitLab
  # auto-provides registry credentials for the project's own image, and k3s has
  # gitlab.homelab.com:5050 configured insecure, so the pull works.
  image:
    name: "${REGISTRY_IMAGE}:${CI_COMMIT_SHORT_SHA}"
    entrypoint: [""]
  needs:
    - job: build-image
  script:
    - EXPECTED=$(grep -oE 'aws-cdk@[0-9.]+' "${CI_PROJECT_DIR}/Dockerfile" | head -1 | cut -d@ -f2)
    - ACTUAL=$(/usr/local/bin/cdk --version | awk '{print $1}')
    - 'echo "expected cdk ${EXPECTED}, got ${ACTUAL}"'
    - test "${EXPECTED}" = "${ACTUAL}"
    - 'echo "smoke test passed — cdk ${ACTUAL} runs cleanly"'
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'

scout-cves:
  stage: scan
  image: alpine:3.20
  needs:
    - job: build-image
      artifacts: true
  variables:
    GIT_STRATEGY: none
    DOCKER_SCOUT_HUB_USER: "$DOCKERHUB_USER"
    DOCKER_SCOUT_HUB_PASSWORD: "$DOCKERHUB_PAT"
  before_script:
    - apk add --no-cache curl ca-certificates jq
    - |
      SCOUT_TAG=$(curl -fsSL https://api.github.com/repos/docker/scout-cli/releases/latest | jq -r .tag_name)
      SCOUT_VERSION=${SCOUT_TAG#v}
      curl -fsSL "https://github.com/docker/scout-cli/releases/download/${SCOUT_TAG}/docker-scout_${SCOUT_VERSION}_linux_amd64.tar.gz" | tar xz -C /usr/local/bin docker-scout
      chmod +x /usr/local/bin/docker-scout
    - docker-scout version
  script:
    - docker-scout cves "archive://${CI_PROJECT_DIR}/image.tar" --only-severity critical,high --only-fixed --exit-code
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
