stages:
  - build
  - scan

variables:
  REGISTRY_IMAGE: "$CI_REGISTRY_IMAGE"

build-image:
  stage: build
  image:
    name: gcr.io/kaniko-project/executor:debug
    entrypoint: [""]
  before_script:
    - mkdir -p /kaniko/.docker
    - >
      echo "{\"auths\":{\"${CI_REGISTRY}\":{\"username\":\"${CI_REGISTRY_USER}\",\"password\":\"${CI_REGISTRY_PASSWORD}\"}}}"
      > /kaniko/.docker/config.json
  script:
    - >
      /kaniko/executor
      --context "${CI_PROJECT_DIR}"
      --dockerfile "${CI_PROJECT_DIR}/Dockerfile"
      --destination "${REGISTRY_IMAGE}:${CI_COMMIT_SHORT_SHA}"
      --destination "${REGISTRY_IMAGE}:latest"
      --build-arg "APK_REFRESH=${CI_PIPELINE_ID}"
      --insecure
      --skip-tls-verify
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'

scout-cves:
  stage: scan
  image: alpine:3.20
  needs:
    - build-image
  variables:
    DOCKER_SCOUT_HUB_USER: "$DOCKERHUB_USER"
    DOCKER_SCOUT_HUB_PASSWORD: "$DOCKERHUB_PAT"
  before_script:
    - apk add --no-cache curl ca-certificates
    - curl -fsSL https://raw.githubusercontent.com/docker/scout-cli/main/install.sh | sh -s --
    - docker-scout version
    - mkdir -p ~/.docker
    - >
      echo "{\"auths\":{\"${CI_REGISTRY}\":{\"username\":\"${CI_REGISTRY_USER}\",\"password\":\"${CI_REGISTRY_PASSWORD}\"}}}"
      > ~/.docker/config.json
  script:
    - docker-scout cves "${CI_REGISTRY_IMAGE}:${CI_COMMIT_SHORT_SHA}" --only-severity critical,high --exit-code
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
